<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111213">
<title>XAUUSD ロット計算</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23111213'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23E8B93F' font-family='sans-serif' font-weight='bold'%3EAu%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #111213;
    --panel: #1B1D1F;
    --panel-2: #232629;
    --line: #2E3236;
    --text: #EDEDEA;
    --text-dim: #9BA0A6;
    --text-faint: #6B7076;
    --gold: #E8B93F;
    --gold-dim: #8A6E24;
    --red: #E5604F;
    --green: #4FB98A;
    --blue: #5B9BD9;
    --amber: #D9A441;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    min-height: 100vh;
    padding: max(env(safe-area-inset-top), 16px) 16px calc(env(safe-area-inset-bottom) + 24px);
  }
  .wrap { max-width: 460px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 8px 2px 14px;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.02em; }
  header h1 span { color: var(--gold); }
  header .rr-tag { font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .mode-switch {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 12px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 4px;
    border-radius: 9px;
    cursor: pointer;
  }
  .mode-btn.active { background: var(--panel-2); color: var(--gold); }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px 8px;
  }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 2px;
    letter-spacing: 0.03em;
  }
  .field input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 22px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    font-family: inherit;
  }
  .field:focus-within { border-color: var(--gold-dim); }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .hidden { display: none !important; }

  .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .field.entry:focus-within { border-color: var(--blue); }
  .field.sl:focus-within { border-color: var(--red); }
  .field.entry label { color: var(--blue); }
  .field.sl label { color: var(--red); }

  .dir-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 14px 0 6px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 20px;
  }
  .dir-pill {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 99px;
    letter-spacing: 0.05em;
  }
  .dir-pill.long { background: rgba(91,155,217,0.15); color: var(--blue); }
  .dir-pill.short { background: rgba(217,164,65,0.15); color: var(--amber); }

  .result {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    margin-top: 8px;
    overflow: hidden;
  }
  .result-main {
    text-align: center;
    padding: 22px 16px 18px;
    border-bottom: 1px solid var(--line);
  }
  .result-main .cap {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .result-main .lots {
    font-size: 52px;
    font-weight: 600;
    line-height: 1.1;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
  }
  .result-main .lots small {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-dim);
    margin-left: 4px;
  }
  .result-main .oz {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .risk-line {
    text-align: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .risk-line strong { color: var(--red); font-weight: 600; font-size: 15px; }
  .risk-line .pct { font-weight: 600; }
  .result-sub {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .cell { padding: 14px 8px 16px; text-align: center; }
  .cell + .cell { border-left: 1px solid var(--line); }
  .cell .k { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
  .cell .v { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .cell .s { font-size: 11px; color: var(--text-faint); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .v.profit { color: var(--green); }

  .warn {
    text-align: center;
    font-size: 13px;
    color: var(--red);
    min-height: 18px;
    margin-top: 12px;
    line-height: 1.6;
  }
  .warn.caution { color: var(--amber); }

  footer {
    margin-top: 18px;
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.7;
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1><span>Au</span> XAUUSD ロット計算</h1>
    <div class="rr-tag" id="rr-tag">Axiory Nano</div>
  </header>

  <div class="mode-switch">
    <button class="mode-btn active" id="mode-auto" type="button">自動（リスク%）</button>
    <button class="mode-btn" id="mode-manual" type="button">手動（ロット指定）</button>
  </div>

  <div class="field-grid">
    <div class="field">
      <label for="balance">口座資金 (円)</label>
      <input type="number" id="balance" inputmode="decimal" value="27816" step="1000">
    </div>
    <div class="field" id="wrap-risk">
      <label for="risk">リスク (%)</label>
      <input type="number" id="risk" inputmode="decimal" value="20" step="1">
    </div>
    <div class="field hidden" id="wrap-lot">
      <label for="lot">ロット指定</label>
      <input type="number" id="lot" inputmode="decimal" value="0.02" step="0.01">
    </div>
    <div class="field">
      <label for="rr">リスクリワード比 (1 : ◯)</label>
      <input type="number" id="rr" inputmode="decimal" value="3" step="0.5">
    </div>
    <div class="field">
      <label for="usdjpy">ドル円レート <span id="rate-status" style="color: var(--text-faint);"></span></label>
      <input type="number" id="usdjpy" inputmode="decimal" value="161" step="0.1">
    </div>
  </div>

  <div class="price-row">
    <div class="field entry">
      <label for="entry">エントリー価格</label>
      <input type="number" id="entry" inputmode="decimal" value="" placeholder="4160.0" step="0.1">
    </div>
    <div class="field sl">
      <label for="sl">損切り価格 (SL)</label>
      <input type="number" id="sl" inputmode="decimal" value="" placeholder="4145.0" step="0.1">
    </div>
  </div>

  <div class="dir-bar" id="dir-bar"></div>

  <div class="result">
    <div class="result-main">
      <div class="cap" id="lot-cap">推奨ロット</div>
      <div class="lots"><span id="out-lots">—</span><small>lot</small></div>
      <div class="oz" id="out-oz"></div>
    </div>
    <div class="risk-line" id="risk-line">実際のリスク：—</div>
    <div class="result-sub">
      <div class="cell">
        <div class="k">利確 (TP)</div>
        <div class="v" id="out-tp">—</div>
        <div class="s" id="out-tpdist"></div>
      </div>
      <div class="cell">
        <div class="k">想定利益</div>
        <div class="v profit" id="out-profit">—</div>
        <div class="s" id="out-rr2"></div>
      </div>
      <div class="cell">
        <div class="k">必要証拠金</div>
        <div class="v" id="out-margin">—</div>
        <div class="s">レバ 1:400</div>
      </div>
    </div>
  </div>

  <div class="warn" id="warn"></div>

  <footer>
    Axiory ナノ口座仕様：1 lot = 100 oz / 最小 0.01 lot 刻み / 手数料 往復$6/lot<br>
    自動モードはリスク%から算出したロットを0.01刻みに切り捨て、実際のリスクを再計算して表示<br>
    想定利益は手数料差引後の金額 / ドル円レートは起動時に自動取得（手動修正可）
  </footer>

</div>

<script>
(function(){
  var ids = ['balance','risk','lot','rr','usdjpy','entry','sl'];
  var el = {};
  ids.forEach(function(k){ el[k] = document.getElementById(k); });

  var KEY = 'xauusd-lot-calc-axiory';
  var mode = 'auto';
  var LOT_STEP = 0.01;
  var LEVERAGE = 400;
  var COMM_PER_LOT_USD = 6;

  function load(){
    try {
      var saved = JSON.parse(localStorage.getItem(KEY) || '{}');
      ['balance','risk','lot','rr','usdjpy'].forEach(function(k){
        if (saved[k] !== undefined && saved[k] !== '') el[k].value = saved[k];
      });
      if (saved.mode === 'manual') setMode('manual', true);
    } catch(e) {}
  }

  function save(){
    try {
      localStorage.setItem(KEY, JSON.stringify({
        balance: el.balance.value,
        risk: el.risk.value,
        lot: el.lot.value,
        rr: el.rr.value,
        usdjpy: el.usdjpy.value,
        mode: mode
      }));
    } catch(e) {}
  }

  function fmtJPY(n){
    return '¥' + Math.round(n).toLocaleString('ja-JP');
  }

  function setMode(m, silent){
    mode = m;
    document.getElementById('mode-auto').classList.toggle('active', m === 'auto');
    document.getElementById('mode-manual').classList.toggle('active', m === 'manual');
    document.getElementById('wrap-risk').classList.toggle('hidden', m !== 'auto');
    document.getElementById('wrap-lot').classList.toggle('hidden', m !== 'manual');
    document.getElementById('lot-cap').textContent = m === 'auto' ? '推奨ロット' : '指定ロット';
    if (!silent){ calc(); save(); }
  }

  function clearOut(msg){
    ['out-lots','out-tp','out-profit','out-margin'].forEach(function(i){
      document.getElementById(i).textContent = '—';
    });
    document.getElementById('out-oz').textContent = '';
    document.getElementById('out-tpdist').textContent = '';
    document.getElementById('out-rr2').textContent = '';
    document.getElementById('risk-line').innerHTML = '実際のリスク：—';
    document.getElementById('dir-bar').innerHTML = '';
    var warn = document.getElementById('warn');
    warn.className = 'warn';
    warn.textContent = msg || '';
  }

  function calc(){
    var bal = parseFloat(el.balance.value) || 0;
    var riskPct = parseFloat(el.risk.value) || 0;
    var manualLot = parseFloat(el.lot.value) || 0;
    var rr = parseFloat(el.rr.value) || 0;
    var rate = parseFloat(el.usdjpy.value) || 0;
    var entry = parseFloat(el.entry.value) || 0;
    var sl = parseFloat(el.sl.value) || 0;

    document.getElementById('rr-tag').textContent = 'Axiory Nano · RR 1 : ' + (rr || '—');

    var baseOk = entry && sl && entry !== sl && bal && rr && rate;
    var modeOk = mode === 'auto' ? riskPct > 0 : manualLot > 0;
    if (!baseOk || !modeOk){
      clearOut(entry && sl && entry === sl ? 'エントリーと損切りが同じ価格です' : '');
      return;
    }

    var isLong = sl < entry;
    var slDist = Math.abs(entry - sl);
    var lots, rawLots = null;

    if (mode === 'auto'){
      var riskJPYTarget = bal * riskPct / 100;
      var riskUSDTarget = riskJPYTarget / rate;
      rawLots = riskUSDTarget / (slDist * 100);
      lots = Math.floor(rawLots / LOT_STEP) * LOT_STEP;
      lots = Math.round(lots * 100) / 100;
    } else {
      lots = manualLot;
    }

    var warn = document.getElementById('warn');
    warn.className = 'warn';
    warn.textContent = '';

    if (lots < LOT_STEP){
      var minRiskJPY = LOT_STEP * slDist * 100 * rate;
      var minRiskPct = bal > 0 ? (minRiskJPY / bal * 100) : 0;
      clearOut('');
      document.getElementById('dir-bar').innerHTML = '<span class="dir-pill ' + (isLong ? 'long">ロング' : 'short">ショート') + '</span>';
      warn.textContent = '最小ロット0.01に届きません。0.01でのリスクは ' + fmtJPY(minRiskJPY) + '（口座の' + minRiskPct.toFixed(1) + '%）です';
      return;
    }

    var actualRiskUSD = lots * slDist * 100;
    var actualRiskJPY = actualRiskUSD * rate;
    var actualRiskPct = bal > 0 ? (actualRiskJPY / bal * 100) : 0;

    var tpDist = slDist * rr;
    var tp = isLong ? entry + tpDist : entry - tpDist;
    var commJPY = lots * COMM_PER_LOT_USD * rate;
    var grossProfitJPY = actualRiskJPY * rr;
    var netProfitJPY = grossProfitJPY - commJPY;
    var marginJPY = entry * 100 * lots / LEVERAGE * rate;
    var oz = lots * 100;

    document.getElementById('dir-bar').innerHTML = '<span class="dir-pill ' + (isLong ? 'long">ロング' : 'short">ショート') + '</span>';

    document.getElementById('out-lots').textContent = lots.toFixed(2);
    var ozText = '約 ' + (oz >= 10 ? Math.round(oz) : oz.toFixed(1)) + ' oz';
    if (mode === 'auto' && rawLots !== null && rawLots - lots > 0.0005){
      ozText += '（計算値 ' + rawLots.toFixed(3) + ' を切り捨て）';
    }
    document.getElementById('out-oz').textContent = ozText;

    document.getElementById('risk-line').innerHTML =
      '実際のリスク：<strong>' + fmtJPY(actualRiskJPY) + '</strong>（口座の<span class="pct">' + actualRiskPct.toFixed(1) + '%</span> / SL幅 ' + slDist.toFixed(1) + '）';

    document.getElementById('out-tp').textContent = tp.toFixed(1);
    document.getElementById('out-tpdist').textContent = 'TP幅 ' + tpDist.toFixed(1);
    document.getElementById('out-profit').textContent = fmtJPY(netProfitJPY);
    document.getElementById('out-rr2').textContent = '手数料込 1 : ' + (actualRiskJPY > 0 ? (netProfitJPY / (actualRiskJPY + commJPY)).toFixed(2) : '—');
    document.getElementById('out-margin').textContent = fmtJPY(marginJPY);

    if (actualRiskPct > 25){
      warn.className = 'warn';
      warn.textContent = 'リスクが口座の25%を超えています（4連敗以内で残高が尽きる水準）';
    } else if (actualRiskPct > 10){
      warn.className = 'warn caution';
      warn.textContent = '高リスク設定です：連敗時は残高に合わせてロットを見直してください';
    }
  }

  ids.forEach(function(k){
    el[k].addEventListener('input', function(){ calc(); save(); });
  });
  document.getElementById('mode-auto').addEventListener('click', function(){ setMode('auto'); });
  document.getElementById('mode-manual').addEventListener('click', function(){ setMode('manual'); });

  var rateEdited = false;
  el.usdjpy.addEventListener('input', function(){ rateEdited = true; });

  function fetchRate(){
    var status = document.getElementById('rate-status');
    status.textContent = '取得中…';
    fetch('https://open.er-api.com/v6/latest/USD')
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (rateEdited) { status.textContent = '手動'; return; }
        var jpy = data && data.rates && data.rates.JPY;
        if (jpy && jpy > 0){
          el.usdjpy.value = jpy.toFixed(1);
          status.textContent = '自動取得';
          calc(); save();
        } else {
          status.textContent = '前回値';
        }
      })
      .catch(function(){
        status.textContent = '前回値';
      });
  }

  load();
  calc();
  fetchRate();
})();
</script>
</body>
</html>
